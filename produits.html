<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tous les produits — Oni Knives</title>
  <meta name="description" content="Tous nos couteaux de cuisine artisanaux et cartes cadeau Oni Knives.">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>🗡️</text></svg>">
</head>
<body>
  <header class="header">
    <div class="container header-inner">
      <a href="index.html" class="logo">Oni <span>Knives</span></a>
      <nav class="nav">
        <a href="index.html">Accueil</a>
        <a href="produits.html">Produits</a>
        <a href="a-propos.html">À propos</a>
        <a href="contact.html">Contact</a>
      </nav>
      <button class="hamburger" aria-label="Menu"><span></span><span></span><span></span></button>
      <a href="admin/" class="admin-icon" title="Administration" aria-label="Administration">⚙</a>
    </div>
  </header>

  <section class="section">
    <div class="container">
      <h2 class="section-title">Tous les produits</h2>
      <p class="section-subtitle">Couteaux de cuisine artisanaux et cartes cadeau</p>
      <div class="product-grid" id="all-products"></div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <div class="footer-links">
        <a href="index.html">Accueil</a>
        <a href="produits.html">Produits</a>
        <a href="a-propos.html">À propos</a>
        <a href="contact.html">Contact</a>
      </div>
      <p>&copy; 2026 Oni Knives — Couteaux de cuisine artisanaux</p>
    </div>
  </footer>

  <script src="js/app.js"></script>
  <script>
    loadProducts().then(products => {
      const params = new URLSearchParams(window.location.search);
      const cat = params.get('categorie');
      const filtered = cat ? products.filter(p => p.category.toLowerCase().replace(/\s+/g, '-') === cat) : products;
      if (filtered.length === 0) {
        document.getElementById('all-products').innerHTML = '<p style="grid-column:1/-1;text-align:center;color:#888;">Aucun produit trouvé.</p>';
      } else {
        renderProducts(filtered, 'all-products');
      }
    });
  </script>
</body>
</html>
