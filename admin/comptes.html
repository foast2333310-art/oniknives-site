<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comptes - LaCorpo Admin</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a1a;
      color: #fff;
      min-height: 100vh;
    }
    .header {
      background: #2a2a2a; padding: 16px 32px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid #333;
    }
    .header h1 { color: #f0e6d0; font-size: 20px; }
    .header .links a { color: #c8a87c; text-decoration: none; font-size: 14px; margin-left: 20px; }
    .header .links a:hover { color: #dbb98a; }
    .container { max-width: 960px; margin: 0 auto; padding: 32px; }
    .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .toolbar h2 { font-size: 22px; color: #f0e6d0; }
    .empty-state { text-align: center; padding: 60px 20px; color: #666; }
    .empty-state h3 { font-size: 20px; margin-bottom: 8px; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: #666; padding: 10px 12px; border-bottom: 1px solid #333; font-weight: 600; }
    td { padding: 12px; border-bottom: 1px solid #222; font-size: 0.85rem; vertical-align: middle; }
    tr:hover td { background: rgba(255,255,255,0.02); }
    .email-col { color: #ccc; font-size: 13px; }
    .role-select {
      background: #1a1a1a; border: 1px solid #444; border-radius: 6px;
      color: #fff; font-size: 13px; padding: 6px 10px; outline: none; cursor: pointer;
    }
    .role-select:focus { border-color: #c8a87c; }
    .date-col { color: #666; font-size: 12px; white-space: nowrap; }
    .comm-col { font-size: 12px; line-height: 1.6; }
    .count-badge {
      background: #c8a87c; color: #1a1a1a; font-size: 12px; font-weight: 700;
      padding: 2px 8px; border-radius: 10px; margin-left: 8px;
    }
    .actions-col { white-space: nowrap; }
    .btn-sm {
      padding: 5px 12px; border: none; border-radius: 5px; font-size: 12px;
      font-weight: 600; cursor: pointer; transition: opacity .2s;
    }
    .btn-sm:hover { opacity: .8; }
    .btn-sm.edit { background: rgba(200,168,124,0.15); color: #c8a87c; }
    .btn-sm.del { background: rgba(231,76,60,0.15); color: #e74c3c; }
    .modal-overlay {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7); align-items: center; justify-content: center; z-index: 1000;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: #2a2a2a; border-radius: 12px; width: 90%; max-width: 420px;
      padding: 32px;
    }
    .modal h3 { color: #f0e6d0; font-size: 18px; margin-bottom: 4px; }
    .modal .sub { color: #888; font-size: 13px; margin-bottom: 20px; }
    .modal label { display: block; color: #ccc; font-size: 12px; margin-bottom: 4px; }
    .modal input {
      width: 100%; padding: 10px 14px; background: #1a1a1a; border: 1px solid #444;
      border-radius: 6px; color: #fff; font-size: 14px; outline: none; box-sizing: border-box;
    }
    .modal input:focus { border-color: #c8a87c; }
    .modal .field { margin-bottom: 14px; }
    .modal .actions { display: flex; gap: 8px; margin-top: 20px; }
    .modal .actions .btn { flex: 1; padding: 10px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .modal .actions .btn-primary { background: #c8a87c; color: #1a1a1a; }
    .modal .actions .btn-primary:hover { opacity: .85; }
    .modal .actions .btn-secondary { background: #555; color: #fff; }
    .modal .actions .btn-secondary:hover { opacity: .85; }
    .toast {
      position: fixed; bottom: 32px; right: 32px; padding: 14px 24px;
      border-radius: 8px; font-size: 14px; z-index: 2000; display: none;
      animation: slideIn 0.3s ease;
    }
    .toast.success { background: #27ae60; color: #fff; }
    .toast.error { background: #e74c3c; color: #fff; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  </style>
</head>
<body>
  <div class="header">
    <h1>LaCorpo - Comptes</h1>
    <div class="links">
      <a href="dashboard.html">Dashboard</a>
      <a href="produits.html">Produits</a>
      <a href="commandes.html">Commandes</a>
      <a href="codes.html">Codes promo</a>
      <a href="suggestions.html">Suggestions</a>
      <a href="/">Voir le site</a>
      <a href="#" id="logoutBtn">Déconnexion</a>
    </div>
  </div>

  <div class="container">
    <div class="toolbar">
      <h2>Gestion des comptes <span id="countBadge" class="count-badge">0</span></h2>
    </div>
    <table>
      <thead><tr><th>Email</th><th>Rôle</th><th>Commissions</th><th>Inscrit le</th><th style="text-align:right;">Actions</th></tr></thead>
      <tbody id="accountsBody"></tbody>
    </table>
  </div>

  <div class="modal-overlay" id="pwdModal">
    <div class="modal">
      <h3 id="pwdModalTitle">Changer le mot de passe</h3>
      <div class="sub" id="pwdModalEmail"></div>
      <div class="field">
        <label>Nouveau mot de passe</label>
        <input type="password" id="pwdInput" placeholder="Minimum 4 caractères">
      </div>
      <div class="actions">
        <button class="btn btn-secondary" onclick="closePwdModal()">Annuler</button>
        <button class="btn btn-primary" onclick="changePassword()">Appliquer</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    if (!sessionStorage.getItem('admin_logged_in')) {
      window.location.href = 'index.html';
    }

    function getAdminKey() { return localStorage.getItem('admin_api_key'); }
    let pwdTargetEmail = '';

    async function hashPassword(password) {
      const encoder = new TextEncoder();
      const data = encoder.encode(password);
      const hashBuffer = await crypto.subtle.digest('SHA-256', data);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function loadAccounts() {
      try {
        const res = await fetch('/api/accounts', { headers: { 'x-admin-key': getAdminKey() } });
        if (!res.ok) throw new Error();
        const accounts = await res.json();
        document.getElementById('countBadge').textContent = accounts.length;
        const tbody = document.getElementById('accountsBody');
        if (!accounts || accounts.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:60px 20px;color:#666;">Aucun compte pour le moment</td></tr>';
          return;
        }
        tbody.innerHTML = accounts.map(a => {
          const date = a.createdAt ? new Date(a.createdAt).toLocaleDateString('fr-FR') : '—';
          const role = a.role || 'user';
          return `<tr id="row-${a.email.replace(/[@.]/g, '_')}">
            <td class="email-col">${a.email}</td>
            <td>
              <select class="role-select" onchange="updateRole('${a.email.replace(/'/g, "\\'")}', this.value)">
                <option value="user" ${role === 'user' ? 'selected' : ''}>Utilisateur</option>
                <option value="ambassadeur" ${role === 'ambassadeur' ? 'selected' : ''}>Ambassadeur</option>
              </select>
            </td>
            <td class="comm-col" style="font-size:13px;">
              ${role === 'ambassadeur' ? '<span class="amb-loading" style="color:#888;">Chargement...</span>' : '<span style="color:#555;">—</span>'}
            </td>
            <td class="date-col">${date}</td>
            <td class="actions-col" style="text-align:right;white-space:nowrap;">
              <button class="btn-sm edit" onclick="openPwdModal('${a.email.replace(/'/g, "\\'")}')">🔑 MDP</button>
              ${role === 'ambassadeur' ? `<button class="btn-sm" style="background:#6c5ce7;color:#fff;" onclick="resetAmb('${a.email.replace(/'/g, "\\'")}')">🔄 Réinit</button>` : ''}
              <button class="btn-sm del" onclick="deleteAccount('${a.email.replace(/'/g, "\\'")}')">🗑 Suppr</button>
            </td>
          </tr>`;
        }).join('');
        // Load ambassador stats
        accounts.filter(a => a.role === 'ambassadeur').forEach(a => loadAmbStats(a.email));
      } catch {
        document.getElementById('accountsBody').innerHTML = '<tr><td colspan="5" style="text-align:center;padding:60px 20px;color:#e74c3c;">Erreur de chargement</td></tr>';
      }
    }

    async function loadAmbStats(email) {
      const rowId = 'row-' + email.replace(/[@.]/g, '_');
      const td = document.querySelector('#' + rowId + ' .comm-col');
      if (!td) return;
      try {
        const res = await fetch('/api/ambassador/admin-stats?email=' + encodeURIComponent(email), { headers: { 'x-admin-key': getAdminKey() } });
        if (!res.ok) { td.innerHTML = '<span style="color:#e74c3c;">Erreur</span>'; return; }
        const data = await res.json();
        td.innerHTML = '<div><span style="color:#27ae60;font-weight:600;">' + data.totalOrders + '</span> ventes</div><div><span style="color:#c8a87c;font-weight:600;">' + data.totalCommission.toFixed(2).replace('.',',') + ' €</span></div>';
      } catch {
        td.innerHTML = '<span style="color:#e74c3c;">Erreur</span>';
      }
    }

    async function resetAmb(email) {
      if (!confirm('Réinitialiser les commissions de ' + email + ' ?')) return;
      try {
        const res = await fetch('/api/ambassador/reset?email=' + encodeURIComponent(email), { method: 'POST', headers: { 'x-admin-key': getAdminKey() } });
        if (!res.ok) throw new Error();
        showToast('✓ Commissions réinitialisées');
        loadAmbStats(email);
      } catch {
        showToast('Erreur', true);
      }
    }

    async function updateRole(email, role) {
      try {
        const res = await fetch('/api/accounts', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', 'x-admin-key': getAdminKey() },
          body: JSON.stringify({ email, role })
        });
        if (!res.ok) throw new Error();
        showToast('✓ Rôle mis à jour');
      } catch {
        showToast('Erreur', true);
      }
    }

    function openPwdModal(email) {
      pwdTargetEmail = email;
      document.getElementById('pwdModalEmail').textContent = email;
      document.getElementById('pwdInput').value = '';
      document.getElementById('pwdModal').classList.add('active');
    }
    function closePwdModal() {
      document.getElementById('pwdModal').classList.remove('active');
    }

    async function changePassword() {
      const pwd = document.getElementById('pwdInput').value;
      if (!pwd || pwd.length < 4) { showToast('Minimum 4 caractères', true); return; }
      const hash = await hashPassword(pwd);
      try {
        const res = await fetch('/api/accounts', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', 'x-admin-key': getAdminKey() },
          body: JSON.stringify({ email: pwdTargetEmail, password: hash })
        });
        if (!res.ok) throw new Error();
        closePwdModal();
        showToast('✓ Mot de passe modifié');
      } catch {
        showToast('Erreur', true);
      }
    }

    async function deleteAccount(email) {
      if (!confirm('Supprimer le compte ' + email + ' ?')) return;
      try {
        const res = await fetch('/api/accounts?email=' + encodeURIComponent(email), {
          method: 'DELETE',
          headers: { 'x-admin-key': getAdminKey() }
        });
        if (!res.ok) throw new Error();
        await loadAccounts();
        showToast('✓ Compte supprimé');
      } catch {
        showToast('Erreur', true);
      }
    }

    function showToast(msg, isError = false) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast ' + (isError ? 'error' : 'success');
      t.style.display = 'block';
      setTimeout(() => { t.style.display = 'none'; }, 3000);
    }

    document.getElementById('logoutBtn').addEventListener('click', () => {
      sessionStorage.removeItem('admin_logged_in');
      localStorage.removeItem('admin_api_key');
      window.location.href = 'index.html';
    });
    document.getElementById('pwdModal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closePwdModal();
    });

    loadAccounts();
  </script>
</body>
</html>
