<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Codes promo - LaCorpo Admin</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a1a; color: #fff; min-height: 100vh; }
    .header { background: #2a2a2a; padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #333; }
    .header h1 { color: #f0e6d0; font-size: 20px; }
    .header .links a { color: #c8a87c; text-decoration: none; font-size: 14px; margin-left: 20px; }
    .header .links a:hover { color: #dbb98a; }
    .container { max-width: 800px; margin: 0 auto; padding: 32px; }
    .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .toolbar h2 { font-size: 22px; color: #f0e6d0; }
    .btn { padding: 10px 20px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #c8a87c; color: #1a1a1a; }
    .btn-danger { background: #e74c3c; color: #fff; }
    .btn-success { background: #27ae60; color: #fff; }
    .btn-secondary { background: #555; color: #fff; }
    .card { background: #2a2a2a; border-radius: 10px; padding: 20px; border: 1px solid #333; margin-bottom: 16px; }
    .card h3 { color: #f0e6d0; font-size: 16px; margin-bottom: 16px; }
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; color: #ccc; font-size: 13px; margin-bottom: 4px; }
    .form-group input, .form-group select { width: 100%; padding: 10px 14px; background: #1a1a1a; border: 1px solid #444; border-radius: 6px; color: #fff; font-size: 14px; outline: none; }
    .form-group input:focus, .form-group select:focus { border-color: #c8a87c; }
    .form-row { display: flex; gap: 12px; }
    .form-row .form-group { flex: 1; }
    .form-actions { display: flex; gap: 10px; margin-top: 16px; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; color: #888; font-size: 12px; padding: 8px 12px; border-bottom: 1px solid #333; }
    td { padding: 10px 12px; border-bottom: 1px solid #222; font-size: 14px; }
    .badge-code { background: #2a2a2a; padding: 4px 10px; border-radius: 4px; font-family: monospace; font-size: 14px; color: #c8a87c; border: 1px solid #444; }
    .badge-used { background: #e74c3c; color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 4px; }
    .badge-active { background: #27ae60; color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 4px; }
    .toast { position: fixed; bottom: 32px; right: 32px; padding: 14px 24px; border-radius: 8px; font-size: 14px; z-index: 2000; display: none; animation: slideIn 0.3s ease; }
    .toast.success { background: #27ae60; color: #fff; }
    .toast.error { background: #e74c3c; color: #fff; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .empty-state { text-align: center; padding: 40px; color: #666; }
  </style>
</head>
<body>
  <div class="header">
    <h1>LaCorpo - Codes promo</h1>
    <div class="links">
      <a href="dashboard.html">Dashboard</a>
      <a href="produits.html">Produits</a>
      <a href="commandes.html">Commandes</a>
      <a href="/">Voir le site</a>
      <a href="#" id="logoutBtn">Déconnexion</a>
    </div>
  </div>

  <div class="container">
    <div class="toolbar">
      <h2>🎟 Codes promo</h2>
    </div>

    <div class="card">
      <h3>Créer un code promo</h3>
      <form id="codeForm">
        <div class="form-row">
          <div class="form-group">
            <label for="codeName">Code</label>
            <input type="text" id="codeName" placeholder="ex: BIENVENUE5" required>
          </div>
          <div class="form-group">
            <label for="codeDiscount">Réduction (€)</label>
            <input type="number" id="codeDiscount" step="0.01" min="0.01" placeholder="5" required>
          </div>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-success">+ Créer le code</button>
        </div>
      </form>
    </div>

    <div class="card">
      <h3>Codes existants</h3>
      <div id="codesList">
        <div class="empty-state">Aucun code promo pour le moment.</div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    if (!sessionStorage.getItem('admin_logged_in')) {
      window.location.href = 'index.html';
    }

    const API = '/api/codes';

    function getAdminKey() {
      return localStorage.getItem('admin_api_key');
    }

    async function loadCodes() {
      try {
        const res = await fetch(API, { headers: { 'x-admin-key': getAdminKey() } });
        return await res.json();
      } catch { return []; }
    }

    function renderCodes(codes) {
      const el = document.getElementById('codesList');
      if (!codes || codes.length === 0) {
        el.innerHTML = '<div class="empty-state">Aucun code promo pour le moment.</div>';
        return;
      }
      el.innerHTML = `
        <table>
          <thead><tr><th>Code</th><th>Réduction</th><th>Créé le</th><th>Statut</th><th></th></tr></thead>
          <tbody>
            ${codes.map(c => `
              <tr>
                <td><span class="badge-code">${c.code}</span></td>
                <td>-${c.discount} €</td>
                <td>${new Date(c.createdAt).toLocaleDateString('fr-FR')}</td>
                <td>${c.usedBy ? '<span class="badge-used">Utilisé</span>' : '<span class="badge-active">Actif</span>'}</td>
                <td>${c.usedBy ? '' : `<button class="btn btn-danger" onclick="deleteCode(${c.id})" style="padding:4px 12px;font-size:12px;">Supprimer</button>`}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>`;
    }

    document.getElementById('codeForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const code = document.getElementById('codeName').value.trim();
      const discount = document.getElementById('codeDiscount').value;
      if (!code || !discount) return;
      try {
        const res = await fetch(API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-admin-key': getAdminKey() },
          body: JSON.stringify({ code, discount })
        });
        const result = await res.json();
        if (!res.ok) throw new Error(result.error);
        document.getElementById('codeName').value = '';
        document.getElementById('codeDiscount').value = '';
        showToast('✓ Code créé');
        refresh();
      } catch (e) {
        showToast('Erreur: ' + e.message, true);
      }
    });

    async function deleteCode(id) {
      if (!confirm('Supprimer ce code ?')) return;
      try {
        const res = await fetch(API + '?id=' + id, { method: 'DELETE', headers: { 'x-admin-key': getAdminKey() } });
        if (!res.ok) throw new Error('Erreur');
        showToast('Supprimé');
        refresh();
      } catch (e) {
        showToast('Erreur: ' + e.message, true);
      }
    }

    async function refresh() {
      renderCodes(await loadCodes());
    }

    function showToast(msg, isError = false) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast ' + (isError ? 'error' : 'success');
      t.style.display = 'block';
      setTimeout(() => { t.style.display = 'none'; }, 3000);
    }

    document.getElementById('logoutBtn').addEventListener('click', () => {
      sessionStorage.removeItem('admin_logged_in');
      localStorage.removeItem('admin_api_key');
      window.location.href = 'index.html';
    });

    refresh();
  </script>
</body>
</html>
