<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ambassadeurs - LaCorpo Admin</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a1a; color: #fff; min-height: 100vh; }
    .header { background: #2a2a2a; padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #333; }
    .header h1 { color: #f0e6d0; font-size: 20px; }
    .header .links a { color: #c8a87c; text-decoration: none; font-size: 14px; margin-left: 20px; }
    .header .links a:hover { color: #dbb98a; }
    .container { max-width: 900px; margin: 0 auto; padding: 32px; }
    .toolbar { margin-bottom: 24px; }
    .toolbar h2 { font-size: 22px; color: #f0e6d0; }
    .tier-cards { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
    .tier-card { flex: 1; min-width: 120px; background: #2a2a2a; border-radius: 10px; padding: 16px; text-align: center; border: 1px solid #333; }
    .tier-card .icon { font-size: 28px; }
    .tier-card .name { font-size: 14px; font-weight: 600; margin: 4px 0; }
    .tier-card .req { font-size: 12px; color: #888; }
    .tier-card .comm { font-size: 12px; color: #27ae60; margin-top: 4px; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; color: #888; font-size: 12px; padding: 8px 12px; border-bottom: 1px solid #333; text-transform: uppercase; letter-spacing: 1px; }
    td { padding: 10px 12px; border-bottom: 1px solid #222; font-size: 14px; vertical-align: middle; }
    tr:hover td { background: rgba(255,255,255,0.02); }
    .rank { font-size: 13px; font-weight: 700; color: #555; }
    .rank-1 { color: #ffd700; }
    .rank-2 { color: #c0c0c0; }
    .rank-3 { color: #cd7f32; }
    .badge-tier { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; }
    .empty-state { text-align: center; padding: 60px 20px; color: #666; }
    .loading { text-align: center; padding: 60px; color: #666; }
    .count-badge { background: #c8a87c; color: #1a1a1a; font-size: 12px; font-weight: 700; padding: 2px 8px; border-radius: 10px; margin-left: 8px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>LaCorpo - Ambassadeurs</h1>
    <div class="links">
      <a href="dashboard.html">Dashboard</a>
      <a href="produits.html">Produits</a>
      <a href="commandes.html">Commandes</a>
      <a href="codes.html">Codes promo</a>
      <a href="comptes.html">Comptes</a>
      <a href="analytics.html">Analytics</a>
      <a href="tiers.html">Paliers</a>
      <a href="/">Voir le site</a>
      <a href="#" id="logoutBtn">Déconnexion</a>
    </div>
  </div>

  <div class="container">
    <div class="toolbar"><h2>🏆 Classement Ambassadeurs <span class="count-badge" id="countBadge">0</span></h2></div>

    <div class="tier-cards">
      <div class="tier-card"><div class="icon">🥉</div><div class="name" style="color:#cd7f32;">Bronze</div><div class="req">0-4 ventes</div><div class="comm">5% commission</div></div>
      <div class="tier-card"><div class="icon">🥈</div><div class="name" style="color:#c0c0c0;">Argent</div><div class="req">5-19 ventes</div><div class="comm">8% commission</div></div>
      <div class="tier-card"><div class="icon">🥇</div><div class="name" style="color:#ffd700;">Or</div><div class="req">20-49 ventes</div><div class="comm">12% commission</div></div>
      <div class="tier-card"><div class="icon">💎</div><div class="name" style="color:#b9f2ff;">Diamant</div><div class="req">50+ ventes</div><div class="comm">15% commission</div></div>
    </div>

    <div id="loading" class="loading"><span class="spinner"></span> Chargement...</div>
    <div id="leaderboardTable" style="display:none;"></div>
  </div>

  <script>
    if (!sessionStorage.getItem('admin_logged_in')) window.location.href = 'index.html';
    function getAdminKey() { return localStorage.getItem('admin_api_key'); }

    async function loadLeaderboard() {
      try {
        const res = await fetch('/api/ambassador/leaderboard', { headers: { 'x-admin-key': getAdminKey() } });
        if (!res.ok) throw new Error();
        const data = await res.json();
        document.getElementById('loading').style.display = 'none';
        document.getElementById('leaderboardTable').style.display = 'block';
        document.getElementById('countBadge').textContent = data.length;

        if (!data || data.length === 0) {
          document.getElementById('leaderboardTable').innerHTML = '<div class="empty-state">Aucun ambassadeur pour le moment.</div>';
          return;
        }

        document.getElementById('leaderboardTable').innerHTML = `<table><thead><tr><th>#</th><th>Ambassadeur</th><th>Palier</th><th>Ventes</th><th>Gains</th><th>Inscrit</th></tr></thead><tbody>
          ${data.map((a, i) => {
            const rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : '';
            return `<tr><td><span class="rank ${rankClass}">#${i + 1}</span></td>
              <td>${a.email}</td>
              <td><span class="badge-tier" style="background:${a.tier.color}22;color:${a.tier.color};">${a.tier.icon} ${a.tier.name}</span></td>
              <td>${a.sales}</td>
              <td style="color:#27ae60;font-weight:600;">${a.totalCommission.toFixed(2).replace('.',',')} €</td>
              <td style="color:#666;font-size:12px;">${new Date(a.joinedAt).toLocaleDateString('fr-FR')}</td></tr>`;
          }).join('')}
        </tbody></table>`;
      } catch {
        document.getElementById('loading').innerHTML = '<span style="color:#e74c3c;">Erreur de chargement</span>';
      }
    }

    document.getElementById('logoutBtn').addEventListener('click', () => {
      sessionStorage.removeItem('admin_logged_in');
      localStorage.removeItem('admin_api_key');
      window.location.href = 'index.html';
    });

    loadLeaderboard();
  </script>
</body>
</html>
