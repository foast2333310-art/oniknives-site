<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://i.goopics.net">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suggestions - LaCorpo Admin</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a1a;
      color: #fff;
      min-height: 100vh;
    }
    .header {
      background: #2a2a2a;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #333;
    }
    .header h1 { color: #f0e6d0; font-size: 20px; }
    .header .links a {
      color: #c8a87c; text-decoration: none; font-size: 14px; margin-left: 20px;
    }
    .header .links a:hover { color: #dbb98a; }
    .container { max-width: 800px; margin: 0 auto; padding: 32px; }
    .toolbar {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;
    }
    .toolbar h2 { font-size: 22px; color: #f0e6d0; }
    .empty-state { text-align: center; padding: 60px 20px; color: #666; }
    .empty-state h3 { font-size: 20px; margin-bottom: 8px; }
    .sugg-card {
      background: #2a2a2a; border-radius: 10px; padding: 20px;
      border: 1px solid #333; margin-bottom: 12px;
    }
    .sugg-card .head {
      display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px;
    }
    .sugg-card .name { color: #c8a87c; font-weight: 600; font-size: 15px; }
    .sugg-card .email { color: #888; font-size: 12px; margin-left: 8px; }
    .sugg-card .date { color: #555; font-size: 11px; white-space: nowrap; }
    .sugg-card .msg { color: #ccc; font-size: 14px; line-height: 1.5; }
    .btn {
      padding: 10px 20px; border: none; border-radius: 8px; font-size: 14px;
      font-weight: 600; cursor: pointer; transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-danger { background: #e74c3c; color: #fff; }
    .toast {
      position: fixed; bottom: 32px; right: 32px; padding: 14px 24px;
      border-radius: 8px; font-size: 14px; z-index: 2000; display: none;
      animation: slideIn 0.3s ease;
    }
    .toast.success { background: #27ae60; color: #fff; }
    .toast.error { background: #e74c3c; color: #fff; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .count-badge {
      background: #c8a87c; color: #1a1a1a; font-size: 12px; font-weight: 700;
      padding: 2px 8px; border-radius: 10px; margin-left: 8px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>LaCorpo - Suggestions</h1>
    <div class="links">
      <a href="dashboard.html">Dashboard</a>
      <a href="produits.html">Produits</a>
      <a href="commandes.html">Commandes</a>
      <a href="codes.html">Codes promo</a>
      <a href="suggestions.html">Suggestions</a>
      <a href="comptes.html">Comptes</a>
      <a href="analytics.html">Analytics</a>
      <a href="ambassadeurs.html">Ambassadeurs</a>
      <a href="tiers.html">Paliers</a>
      <a href="/">Voir le site</a>
      <a href="#" id="logoutBtn">Déconnexion</a>
    </div>
  </div>

  <div class="container">
    <div class="toolbar">
      <h2>💡 Suggestions reçues <span id="countBadge" class="count-badge">0</span></h2>
      <button class="btn btn-danger" onclick="deleteAll()">Tout supprimer</button>
    </div>
    <div id="suggList"></div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    if (!sessionStorage.getItem('admin_logged_in')) {
      window.location.href = 'index.html';
    }

    function getAdminKey() { return localStorage.getItem('admin_api_key'); }

    async function loadSuggestions() {
      try {
        const res = await fetch('/api/suggestions', { headers: { 'x-admin-key': getAdminKey() } });
        const suggs = await res.json();
        const el = document.getElementById('suggList');
        document.getElementById('countBadge').textContent = suggs.length;
        if (!suggs || suggs.length === 0) {
          el.innerHTML = '<div class="empty-state"><h3>Aucune suggestion</h3><p>Les suggestions des visiteurs apparaîtront ici.</p></div>';
          return;
        }
        el.innerHTML = suggs.map(s => {
          const date = new Date(s.createdAt).toLocaleDateString('fr-FR') + ' ' + new Date(s.createdAt).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
          return `<div class="sugg-card">
            <div class="head">
              <div><span class="name">${s.name}</span>${s.email ? `<span class="email">📧 ${s.email}</span>` : ''}</div>
              <div class="date">${date}</div>
            </div>
            <div class="msg">${s.message}</div>
          </div>`;
        }).join('');
      } catch {
        document.getElementById('suggList').innerHTML = '<div class="empty-state"><h3>Erreur de chargement</h3></div>';
      }
    }

    async function deleteAll() {
      if (!confirm('Supprimer TOUTES les suggestions ?')) return;
      try {
        const res = await fetch('/api/suggestions', {
          method: 'DELETE',
          headers: { 'x-admin-key': getAdminKey() }
        });
        if (!res.ok) throw new Error();
        loadSuggestions();
        showToast('Toutes les suggestions supprimées');
      } catch { showToast('Erreur', true); }
    }

    function showToast(msg, isError = false) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast ' + (isError ? 'error' : 'success');
      t.style.display = 'block';
      setTimeout(() => { t.style.display = 'none'; }, 3000);
    }

    document.getElementById('logoutBtn').addEventListener('click', () => {
      sessionStorage.removeItem('admin_logged_in');
      localStorage.removeItem('admin_api_key');
      window.location.href = 'index.html';
    });

    loadSuggestions();
  </script>
</body>
</html>
