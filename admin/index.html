<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Oni Knives</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-container {
      background: #2a2a2a;
      border-radius: 12px;
      padding: 40px;
      width: 380px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }
    .login-container h1 {
      color: #f0e6d0;
      font-size: 24px;
      text-align: center;
      margin-bottom: 8px;
    }
    .login-container p {
      color: #888;
      text-align: center;
      font-size: 14px;
      margin-bottom: 30px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      color: #ccc;
      font-size: 14px;
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      background: #1a1a1a;
      border: 1px solid #444;
      border-radius: 8px;
      color: #fff;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus {
      border-color: #c8a87c;
    }
    .btn {
      width: 100%;
      padding: 12px;
      background: #c8a87c;
      border: none;
      border-radius: 8px;
      color: #1a1a1a;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: #dbb98a; }
    .error {
      color: #ff6b6b;
      font-size: 13px;
      text-align: center;
      margin-top: 12px;
      display: none;
    }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: #666;
      font-size: 13px;
      text-decoration: none;
    }
    .back-link:hover { color: #999; }
  </style>
</head>
<body>
  <div class="login-container">
    <h1>Administration</h1>
    <p>Oni Knives - Panneau d'administration</p>
    <form id="loginForm">
      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" placeholder="Entrez le mot de passe" autofocus>
      </div>
      <div class="form-group">
        <label for="apiKey">Clé API (admin API key)</label>
        <input type="password" id="apiKey" placeholder="Fournie par l'hébergeur">
      </div>
      <button type="submit" class="btn">Connexion</button>
      <div class="error" id="errorMsg">Mot de passe incorrect</div>
    </form>
    <a href="/" class="back-link">&larr; Retour au site</a>
  </div>
  <script src="js/admin-config.js"></script>
  <script>
    async function hashPassword(password) {
      const encoder = new TextEncoder();
      const data = encoder.encode(password);
      const hashBuffer = await crypto.subtle.digest('SHA-256', data);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const apiKey = document.getElementById('apiKey').value;
      const hash = await hashPassword(password);

      if (hash === ADMIN_CONFIG.passwordHash) {
        sessionStorage.setItem('admin_logged_in', 'true');
        localStorage.setItem('admin_api_key', apiKey);
        window.location.href = 'dashboard.html';
      } else {
        document.getElementById('errorMsg').style.display = 'block';
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
      }
    });
  </script>
</body>
</html>
