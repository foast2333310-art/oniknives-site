<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://i.goopics.net">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paliers - LaCorpo Admin</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a1a; color: #fff; min-height: 100vh; }
    .header { background: #2a2a2a; padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #333; }
    .header h1 { color: #f0e6d0; font-size: 20px; }
    .header .links a { color: #c8a87c; text-decoration: none; font-size: 14px; margin-left: 20px; }
    .header .links a:hover { color: #dbb98a; }
    .container { max-width: 700px; margin: 0 auto; padding: 32px; }
    .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .toolbar h2 { font-size: 22px; color: #f0e6d0; }
    .card { background: #2a2a2a; border-radius: 10px; padding: 20px; border: 1px solid #333; margin-bottom: 16px; }
    .card h3 { font-size: 16px; margin-bottom: 16px; }
    .tier-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .tier-header .icon-preview { font-size: 28px; }
    .tier-header input.icon-input { font-size: 20px; width: 50px; text-align: center; }
    .form-row { display: flex; gap: 12px; margin-bottom: 12px; }
    .form-group { flex: 1; }
    .form-group label { display: block; color: #888; font-size: 12px; margin-bottom: 4px; }
    .form-group input { width: 100%; padding: 10px 14px; background: #1a1a1a; border: 1px solid #444; border-radius: 6px; color: #fff; font-size: 14px; outline: none; }
    .form-group input:focus { border-color: #c8a87c; }
    .color-picker { display: flex; gap: 6px; margin-top: 4px; }
    .color-dot { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
    .color-dot.selected { border-color: #fff; }
    .actions { display: flex; gap: 10px; margin-top: 20px; }
    .btn { padding: 10px 20px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #c8a87c; color: #1a1a1a; }
    .btn-success { background: #27ae60; color: #fff; }
    .btn-secondary { background: #555; color: #fff; }
    .toast { position: fixed; bottom: 32px; right: 32px; padding: 14px 24px; border-radius: 8px; font-size: 14px; z-index: 2000; display: none; }
    .toast.success { background: #27ae60; color: #fff; }
    .toast.error { background: #e74c3c; color: #fff; }
    .loading { text-align: center; padding: 60px; color: #666; }
  </style>
  <meta property="og:title" content="Paliers - LaCorpo Admin">
  <meta property="og:description" content="Administration LaCorpo.">
  <meta property="og:url" content="https://lacorpo.vercel.app/admin/">
  <meta property="og:image" content="https://i.goopics.net/k2n1sq.png">
  <meta property="og:site_name" content="LaCorpo">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  </head>
<body>
  <div class="header">
    <h1>LaCorpo - Paliers</h1>
    <div class="links">
      <a href="dashboard.html">Dashboard</a>
      <a href="produits.html">Produits</a>
      <a href="commandes.html">Commandes</a>
      <a href="codes.html">Codes promo</a>
      <a href="comptes.html">Comptes</a>
      <a href="ambassadeurs.html">Ambassadeurs</a>
      <a href="analytics.html">Analytics</a>
      <a href="/">Voir le site</a>
      <a href="#" id="logoutBtn">Déconnexion</a>
    </div>
  </div>

  <div class="container">
    <div class="toolbar"><h2>🏆 Paliers ambassadeurs</h2></div>
    <p style="color:#888;font-size:13px;margin-bottom:20px;">Modifiez les paliers et les commissions. Les ambassadeurs voient les changements en temps réel dans leur compte.</p>

    <div id="loading" class="loading">Chargement...</div>
    <form id="tiersForm" style="display:none;">
      <div id="tiersList"></div>
      <div class="actions">
        <button type="submit" class="btn btn-success">💾 Enregistrer</button>
        <button type="button" class="btn btn-secondary" onclick="addTier()">+ Ajouter un palier</button>
      </div>
    </form>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    if (!sessionStorage.getItem('admin_logged_in')) window.location.href = 'index.html';
    function getAdminKey() { return localStorage.getItem('admin_api_key'); }

    const COLORS = ['#cd7f32','#c0c0c0','#ffd700','#b9f2ff','#ff6b6b','#48dbfb','#ff9ff3','#feca57','#54a0ff','#5f27cd'];
    let tiers = [];

    function renderTiers() {
      const el = document.getElementById('tiersList');
      el.innerHTML = tiers.map((t, i) => {
        const sorted = [...tiers].sort((a, b) => a.minSales - b.minSales);
        const pos = sorted.indexOf(t);
        const prevMin = pos > 0 ? sorted[pos - 1].minSales : 0;
        return `<div class="card">
          <div class="tier-header">
            <input class="icon-input" value="${t.icon}" onchange="tiers[${i}].icon=this.value" style="background:#1a1a1a;border:1px solid #444;border-radius:6px;padding:4px;color:#fff;font-size:20px;width:50px;text-align:center;">
            <input value="${t.name}" onchange="tiers[${i}].name=this.value" style="flex:1;background:#1a1a1a;border:1px solid #444;border-radius:6px;padding:8px 12px;color:#fff;font-size:16px;font-weight:600;">
            <span onclick="removeTier(${i})" style="cursor:pointer;color:#e74c3c;font-size:18px;">✕</span>
          </div>
          <div class="form-row">
            <div class="form-group"><label>Ventes minimum</label><input type="number" min="0" value="${t.minSales}" onchange="tiers[${i}].minSales=parseInt(this.value)||0"></div>
            <div class="form-group"><label>Commission (%)</label><input type="number" min="0" max="100" step="0.1" value="${t.commission}" onchange="tiers[${i}].commission=parseFloat(this.value)||0"></div>
          </div>
          <div><label style="color:#888;font-size:12px;">Couleur</label>
            <div class="color-picker">${COLORS.map(c => `<div class="color-dot ${t.color === c ? 'selected' : ''}" style="background:${c};" onclick="tiers[${i}].color='${c}';document.querySelectorAll('#tiersList .color-dot').forEach(d=>d.classList.remove('selected'));this.classList.add('selected');"></div>`).join('')}</div>
          </div>
        </div>`;
      }).join('');
    }

    function addTier() {
      tiers.push({ name: 'Nouveau', minSales: 0, commission: 5, color: '#888888', icon: '🏅' });
      renderTiers();
    }

    function removeTier(i) {
      if (tiers.length <= 1) { showToast('Il faut au moins un palier', true); return; }
      tiers.splice(i, 1);
      renderTiers();
    }

    document.getElementById('tiersForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      tiers.sort((a, b) => a.minSales - b.minSales);
      try {
        const res = await fetch('/api/admin/tiers', {
          method: 'POST', headers: { 'Content-Type': 'application/json', 'x-admin-key': getAdminKey() },
          body: JSON.stringify(tiers)
        });
        if (!res.ok) throw new Error();
        showToast('✓ Paliers enregistrés');
      } catch { showToast('Erreur', true); }
    });

    async function loadTiers() {
      try {
        const res = await fetch('/api/admin/tiers', { headers: { 'x-admin-key': getAdminKey() } });
        if (!res.ok) throw new Error();
        tiers = await res.json();
        tiers.sort((a, b) => a.minSales - b.minSales);
        document.getElementById('loading').style.display = 'none';
        document.getElementById('tiersForm').style.display = 'block';
        renderTiers();
      } catch {
        document.getElementById('loading').innerHTML = '<span style="color:#e74c3c;">Erreur de chargement</span>';
      }
    }

    function showToast(msg, isError = false) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.className = 'toast ' + (isError ? 'error' : 'success');
      t.style.display = 'block'; setTimeout(() => { t.style.display = 'none'; }, 3000);
    }

    document.getElementById('logoutBtn').addEventListener('click', () => {
      sessionStorage.removeItem('admin_logged_in');
      localStorage.removeItem('admin_api_key');
      window.location.href = 'index.html';
    });

    loadTiers();
  </script>
</body>
</html>
